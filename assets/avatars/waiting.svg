<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" width="100%" height="100%">
  <defs>
    <linearGradient id="bodyGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#11998e" />
      <stop offset="100%" stop-color="#38ef7d" />
    </linearGradient>
    <filter id="glow" x="-10%" y="-10%" width="120%" height="120%">
      <feDropShadow dx="0" dy="4" stdDeviation="4" flood-color="#38ef7d" flood-opacity="0.3"/>
    </filter>
  </defs>
  <!-- Body -->
  <rect x="15" y="15" width="70" height="70" rx="35" fill="url(#bodyGrad)" filter="url(#glow)" />
  <!-- Face Screen -->
  <rect x="25" y="25" width="50" height="40" rx="15" fill="#1c1e24" />
  <!-- Curious Round Eyes -->
  <circle cx="38" cy="45" r="4.5" fill="#38ef7d" />
  <circle cx="62" cy="45" r="4.5" fill="#38ef7d" />
  <!-- Cute smile -->
  <path d="M 46 54 Q 50 58 54 54" stroke="#38ef7d" stroke-width="2.5" stroke-linecap="round" fill="none" />
  <!-- Cheeks -->
  <circle cx="31" cy="51" r="2.5" fill="#38ef7d" opacity="0.4" />
  <circle cx="69" cy="51" r="2.5" fill="#38ef7d" opacity="0.4" />
</svg>
