<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" width="100%" height="100%">
  <defs>
    <linearGradient id="bodyGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#6a89cc" />
      <stop offset="100%" stop-color="#4a69bd" />
    </linearGradient>
    <filter id="glow" x="-10%" y="-10%" width="120%" height="120%">
      <feDropShadow dx="0" dy="4" stdDeviation="4" flood-color="#4a69bd" flood-opacity="0.3"/>
    </filter>
  </defs>
  <!-- Body -->
  <rect x="15" y="15" width="70" height="70" rx="35" fill="url(#bodyGrad)" filter="url(#glow)" />
  <!-- Face Screen -->
  <rect x="25" y="25" width="50" height="40" rx="15" fill="#1c1e24" />
  <!-- Sad/Droopy Eyes -->
  <path d="M 33 42 Q 38 48 43 45" stroke="#a5b1c2" stroke-width="4" stroke-linecap="round" fill="none" />
  <path d="M 57 45 Q 62 48 67 42" stroke="#a5b1c2" stroke-width="4" stroke-linecap="round" fill="none" />
  <!-- Downward Mouth -->
  <path d="M 46 56 Q 50 51 54 56" stroke="#a5b1c2" stroke-width="3" stroke-linecap="round" fill="none" />
  <!-- Tear Drop -->
  <path d="M 35 52 C 35 55 33 57 31 57 C 29 57 28 55 28 52 C 28 49 31 46 31 46 C 31 46 35 49 35 52 Z" fill="#00d2d3" />
</svg>
