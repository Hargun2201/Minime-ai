<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" width="100%" height="100%">
  <defs>
    <linearGradient id="bodyGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#b150e6" />
      <stop offset="100%" stop-color="#e287ff" />
    </linearGradient>
    <filter id="glow" x="-10%" y="-10%" width="120%" height="120%">
      <feDropShadow dx="0" dy="4" stdDeviation="4" flood-color="#b150e6" flood-opacity="0.4"/>
    </filter>
  </defs>
  <!-- Body -->
  <rect x="15" y="20" width="70" height="70" rx="35" fill="url(#bodyGrad)" filter="url(#glow)" />
  <!-- Face Screen -->
  <rect x="25" y="30" width="50" height="40" rx="15" fill="#1c1e24" />
  <!-- Thinking Eyes (looking up and to the right) -->
  <ellipse cx="40" cy="46" rx="3" ry="5" fill="#e287ff" />
  <ellipse cx="60" cy="46" rx="3" ry="5" fill="#e287ff" />
  <!-- Mouth (flat line or slight curve) -->
  <line x1="46" y1="58" x2="54" y2="58" stroke="#e287ff" stroke-width="3" stroke-linecap="round" />
  <!-- Floating Question Mark -->
  <path d="M 72 20 C 72 15 78 15 78 18 C 78 21 75 22 75 25" fill="none" stroke="#e287ff" stroke-width="2.5" stroke-linecap="round" />
  <circle cx="75" cy="29" r="1.5" fill="#e287ff" />
</svg>
