<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" width="100%" height="100%">
  <defs>
    <linearGradient id="bodyGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#1e3c72" />
      <stop offset="100%" stop-color="#2a5298" />
    </linearGradient>
    <filter id="glow" x="-10%" y="-10%" width="120%" height="120%">
      <feDropShadow dx="0" dy="4" stdDeviation="4" flood-color="#2a5298" flood-opacity="0.3"/>
    </filter>
  </defs>
  <!-- Body -->
  <rect x="15" y="15" width="70" height="70" rx="35" fill="url(#bodyGrad)" filter="url(#glow)" />
  <!-- Face Screen -->
  <rect x="25" y="25" width="50" height="40" rx="15" fill="#1c1e24" />
  <!-- Sleeping Closed Eyes (curved down) -->
  <path d="M 33 46 Q 38 52 43 46" stroke="#4facfe" stroke-width="4" stroke-linecap="round" fill="none" />
  <path d="M 57 46 Q 62 52 67 46" stroke="#4facfe" stroke-width="4" stroke-linecap="round" fill="none" />
  <!-- Small relaxed line for mouth -->
  <circle cx="50" cy="56" r="2.5" fill="#4facfe" />
  <!-- Floating Zzz -->
  <text x="75" y="25" font-family="monospace" font-size="12" fill="#4facfe" font-weight="bold" opacity="0.8">Z</text>
  <text x="82" y="17" font-family="monospace" font-size="8" fill="#4facfe" font-weight="bold" opacity="0.5">z</text>
</svg>
